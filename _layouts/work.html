
<article class="case-study">
<div class="container">
<header class="case-header">
<span class="card-tag">{{ page.category }}</span>
<h1>{{ page.title }}</h1>
<p class="meta-info">Completed on {{ page.date | date: "%B %Y" }}</p>
</header>

{% if page.featured_image %}
<img src="{{ page.featured_image | relative_url }}" alt="{{ page.title }}" style="width: 100%; max-width: 1000px; margin: 0 auto 2rem; display: block; border-radius: 8px;">
{% endif %}

<div class="content-body">
{{ content }}
</div>
</div></article>
