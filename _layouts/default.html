
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="{{ site.url }}" class="logo">{{ site.title | escape }}</a>
            <nav>
                <a href="#work">Work</a>
                <a href="#about">About</a>
                <a href="mailto:your.email@example.com" class="contact-btn">Contact</a>
            </nav>
        </div>
    </header>
    
    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ 'now' | date: "%Y" }} Your Name. Built with Jekyll.</p>
            <div class="socials">
                <a href="https://linkedin.com/in/yourprofile">LinkedIn</a>
            </div>
        </div>
    </footer>
</body>
</html>
